<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- icon page img  -->
    <link rel="icon" type="image/png" href="./iconPage.png" />
    <!-- randaring normally for all element -->
    <link rel="stylesheet" href="./css/normalmize.css" />
    <!-- google font page  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- FONT AWESOME library -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <!-- styling main page  -->
    <link rel="stylesheet" href="css/main.css">
    <title>currency converter</title>
</head>

<body>
    <main class="convert-container">
        <button class="d-mode" aria-label="toggle dark-mode">
            <i class="fa-regular"></i>
        </button>
        <h1>Currency Converter</h1>
        <div class="currency-form">
            <div class="in from">
                <label for="from">From:</label>
                <select id="from">
                    <option disabled selected>Please Enter The Currency</option>
                </select>
            </div>
            <div class="swap">
                <button aria-label="swap-carrency">
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                </button>
            </div>
            <div class="in to">
                <label for="to">To:</label>
                <select id="to"></select>
            </div>
        </div>
        <div class="price">
            <label for="amount">Amount:</label>
            <input id="amount" type="text">
            <span class="massege"></span>
        </div>
        <div class="price res">
            <label for="res">Result:</label>
            <input readonly id="res" type="text">
        </div>
        <button class="convert-button" aria-label="convert-currency">Convert</button>
    </main>
    <script src="js/main.js"></script>
</body>

</html>
